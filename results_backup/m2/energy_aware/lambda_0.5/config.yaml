data:
  arrow_dir: ./data/processed/c4_1pct
  batch_size: 32
  num_workers: 4
  prefetch_factor: 2
  seed: 42
  seq_len: 512
  tokenizer_name: google-t5/t5-small
energy:
  lambda_energy: 0.5
  normalize: true
  sampling_hz: 10
logging:
  eval_interval: 1000
  log_interval: 100
  save_interval: 5000
  wandb_entity: null
  wandb_project: energy-aware-moe
model:
  d_ff: 1024
  d_model: 256
  dropout: 0.1
  max_seq_len: 512
  n_heads: 4
  n_layers: 6
  vocab_size: null
moe:
  alpha_balance: 0.01
  beta_energy: 0.0
  moe_layers:
  - 2
  - 4
  num_experts: 4
  top_k: 1
output:
  checkpoint_dir: ./results/m2/checkpoints
  dir: ./results/m2
training:
  compile: false
  dtype: float16
  grad_clip: 1.0
  lr: 0.0003
  max_tokens: 50000000
  seed: 42
  warmup_tokens: 1000000
  weight_decay: 0.01
